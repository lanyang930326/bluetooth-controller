name: Build APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build apk --release --no-shrink
      - run: mkdir -p output && cp build/app/outputs/flutter-apk/app-release.apk output/bluetooth_controller.apk
      - uses: actions/upload-artifact@v4
        with:
          name: bluetooth-controller-apk
          path: output/bluetooth_controller.apk
          retention-days: 30
      - uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/master'
        with:
          tag_name: v1.0.${{ github.run_number }}
          files: output/bluetooth_controller.apk
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
