name: 编译蓝牙控制器 APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: 安装 Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          channel: stable
          cache: true

      - name: Flutter 环境信息
        run: flutter --version

      - name: 安装 Pub 依赖
        run: flutter pub get

      - name: 编译 APK (Release)
        run: flutter build apk --release

      - name: 重命名 APK
        run: |
          mkdir -p output
          cp build/app/outputs/flutter-apk/app-release.apk output/蓝牙控制器_v1.0.apk

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: 蓝牙控制器APK
          path: output/蓝牙控制器_v1.0.apk
          retention-days: 30

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/master'
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: 蓝牙控制器 v1.0.${{ github.run_number }}
          body: |
            ## 📱 蓝牙控制器 APK
            ### 功能
            - 🔍 自动搜索附近蓝牙设备
            - 📱 点击设备一键连接
            - 🎮 三个控制按钮：上升(0x01)、停止(0x02)、下降(0x03)
            - ✏️ 支持修改设备显示名称
            ### 安装说明
            1. 下载下方 APK 文件
            2. 在 Android 手机上开启「允许安装未知来源应用」
            3. 安装并授予蓝牙权限即可使用
            > 支持 Android 5.0 (API 21) 及以上版本
          files: output/蓝牙控制器_v1.0.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
